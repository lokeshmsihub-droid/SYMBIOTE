# ──────────────────────────────────────────────
# DEV PROFILE — H2 in-memory database
# Activate with: SPRING_PROFILES_ACTIVE=dev
# ──────────────────────────────────────────────

# Override database to H2 for local development
spring.datasource.url=jdbc:h2:file:./data/symbiote_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=

# H2 console for debugging
spring.h2.console.enabled=true

# Show SQL in dev
spring.jpa.show-sql=true

# Verbose logging for dev
logging.level.org.hibernate.SQL=DEBUG
