spring.application.name=backend

# In-memory database for local development
spring.datasource.url=jdbc:h2:mem:symbiote_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true

# Temporary workaround for circular bean references
spring.main.allow-circular-references=true

server.port=8080

# Scoring rules
symbiote.scoring.base-xp=10
symbiote.scoring.difficulty.EASY=1.0
symbiote.scoring.difficulty.MEDIUM=2.0
symbiote.scoring.difficulty.HARD=3.0
symbiote.scoring.streak-bonus.threshold=7
symbiote.scoring.streak-bonus.multiplier=1.3

# Leaderboard cache (Redis)
symbiote.leaderboard.redis-enabled=false

# Jira integration
symbiote.jira.base-url=${JIRA_BASE_URL:https://your-domain.atlassian.net}
symbiote.jira.email=${JIRA_EMAIL:admin@example.com}
symbiote.jira.api-token=${JIRA_API_TOKEN:changeme}
symbiote.jira.project-key=${JIRA_PROJECT_KEY:SYM}
symbiote.jira.webhook-secret=${JIRA_WEBHOOK_SECRET:}
symbiote.jira.story-points-field=${JIRA_STORY_POINTS_FIELD:customfield_10016}