spring.application.name=symbiote

# ──────────────────────────────────────────────
# DATABASE (Azure PostgreSQL — production default)
# ──────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Connection pool hardening for cloud cold starts
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.connection-test-query=SELECT 1

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ──────────────────────────────────────────────
# SERVER
# ──────────────────────────────────────────────
server.port=${PORT:8080}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Temporary workaround for circular bean references
spring.main.allow-circular-references=true

# ──────────────────────────────────────────────
# ACTUATOR & HEALTH
# ──────────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.redis.enabled=false

# ──────────────────────────────────────────────
# LOGGING (structured, cloud-friendly)
# ──────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.symbiote=DEBUG
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=INFO

# ──────────────────────────────────────────────
# SCORING RULES
# ──────────────────────────────────────────────
symbiote.scoring.base-xp=10
symbiote.scoring.difficulty.EASY=1.0
symbiote.scoring.difficulty.MEDIUM=2.0
symbiote.scoring.difficulty.HARD=3.0
symbiote.scoring.streak-bonus.threshold=7
symbiote.scoring.streak-bonus.multiplier=1.3

# Leaderboard cache (Redis)
symbiote.leaderboard.redis-enabled=false

# ──────────────────────────────────────────────
# JIRA INTEGRATION (all env-driven, no defaults)
# ──────────────────────────────────────────────
symbiote.jira.base-url=${JIRA_BASE_URL}
symbiote.jira.email=${JIRA_EMAIL}
symbiote.jira.api-token=${JIRA_API_TOKEN}
symbiote.jira.project-key=${JIRA_PROJECT_KEY}
symbiote.jira.webhook-secret=${JIRA_WEBHOOK_SECRET:}
symbiote.jira.story-points-field=${JIRA_STORY_POINTS_FIELD:customfield_10016}
symbiote.jira.client-id=${JIRA_CLIENT_ID}
symbiote.jira.client-secret=${JIRA_CLIENT_SECRET}
symbiote.jira.auth-url=${JIRA_AUTH_URL}
symbiote.jira.api-base-url=${JIRA_API_BASE_URL}
symbiote.jira.redirect-uri=${JIRA_REDIRECT_URI}
symbiote.jira.webhook-base-url=${WEBHOOK_BASE_URL}

# ──────────────────────────────────────────────
# APPLICATION URLs (all env-driven, no defaults)
# ──────────────────────────────────────────────
symbiote.app.base-url=${APP_BASE_URL}
symbiote.app.frontend-url=${FRONTEND_URL}

# ──────────────────────────────────────────────
# SECURITY
# ──────────────────────────────────────────────
symbiote.security.token-encryption-key=${TOKEN_ENCRYPTION_KEY}
symbiote.security.jwt-secret=${JWT_SECRET}