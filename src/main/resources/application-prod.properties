# ──────────────────────────────────────────────
# PRODUCTION PROFILE
# Activate with: SPRING_PROFILES_ACTIVE=prod
# ──────────────────────────────────────────────

# PostgreSQL (Supabase — use connection pooler port 6543)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

# JPA — use 'update' for first deploy, then switch to 'validate'
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Logging — structured for cloud log aggregation
logging.level.root=WARN
logging.level.com.symbiote=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN

# Disable dev tools in production
spring.h2.console.enabled=false
spring.devtools.restart.enabled=false
